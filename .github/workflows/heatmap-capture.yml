name: 히트맵 자동 캡처

on:
  schedule:
    # S&P500 / 나스닥: KST 월~금 07:00 = UTC 일~목 22:00
    - cron: '0 22 * * 0-4'
    # 코스피: KST 월~금 16:00 = UTC 월~금 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 시 전체 캡처

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright 및 의존성 설치
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: images 폴더 생성
        run: mkdir -p images

      - name: 실행 시각 결정
        id: kst
        run: |
          # 수동 실행(workflow_dispatch)이면 'manual' → 전체 캡처
          # 스케줄 실행이면 KST 시각으로 판단
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "kst_hour=manual" >> $GITHUB_OUTPUT
            echo "수동 실행 → 전체 캡처"
          else
            KST_HOUR=$(TZ='Asia/Seoul' date +%H)
            echo "kst_hour=$KST_HOUR" >> $GITHUB_OUTPUT
            echo "스케줄 실행 → KST ${KST_HOUR}시 기준 캡처"
          fi

      - name: 히트맵 캡처
        run: node capture.js ${{ steps.kst.outputs.kst_hour }}

      - name: 이미지 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet || git commit -m "🗺️ 히트맵 자동 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
