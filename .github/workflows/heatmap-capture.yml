name: 히트맵 자동 캡처

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날) — S&P500 / 나스닥
    - cron: '0 22 * * 0-4'
    # KST 16:00 = UTC 07:00 — 코스피
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright 및 의존성 설치
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: images 폴더 생성
        run: mkdir -p images

      - name: 현재 KST 시각 확인
        id: kst
        run: |
          KST_HOUR=$(TZ='Asia/Seoul' date +%H)
          echo "kst_hour=$KST_HOUR" >> $GITHUB_OUTPUT
          echo "현재 KST 시각: $(TZ='Asia/Seoul' date)"

      - name: 히트맵 캡처
        run: node capture.js ${{ steps.kst.outputs.kst_hour }}

      - name: 이미지 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet || git commit -m "🗺️ 히트맵 자동 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
