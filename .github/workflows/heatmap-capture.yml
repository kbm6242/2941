name: 히트맵 자동 캡처

on:
  schedule:
    # 미국장 마감 후 캡처: KST 화~토 06:00 = UTC 월~금 21:00
    - cron: '0 21 * * 1-5'
    # 한국장 마감 후 캡처: KST 월~금 16:00 = UTC 월~금 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright 및 의존성 설치
        run: |
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: images 폴더 생성
        run: mkdir -p images

      - name: 캡처 타입 결정
        id: captype
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=all" >> $GITHUB_OUTPUT
            echo "수동 실행 → 전체 캡처"
          else
            UTC_HOUR=$(date +%H)
            if [ "$UTC_HOUR" = "21" ] || [ "$UTC_HOUR" = "22" ] || [ "$UTC_HOUR" = "23" ]; then
              echo "type=US" >> $GITHUB_OUTPUT
              echo "스케줄 실행 → 미국장 캡처"
            else
              echo "type=KR" >> $GITHUB_OUTPUT
              echo "스케줄 실행 → 한국장 캡처"
            fi
          fi

      - name: 히트맵 캡처
        run: node capture.js ${{ steps.captype.outputs.type }}

      - name: 이미지 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet || git commit -m "🗺️ 히트맵 자동 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
